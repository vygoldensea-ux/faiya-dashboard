<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FAIYA Dashboard — 3 Options</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050812;color:#e2e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px}
h1{font-size:28px;letter-spacing:3px;color:#fff}
h1 span{color:#f97316}
.cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.card{background:#0d1830;border:1px solid #1e4a8c;border-radius:8px;padding:32px 40px;text-align:center;cursor:pointer;transition:all .2s;text-decoration:none;color:#e2e8f0}
.card:hover{border-color:#f97316;box-shadow:inset 0 0 40px rgba(249,115,22,.15);transform:translateY(-2px)}
.card h2{font-size:20px;margin-bottom:8px}
.card p{font-size:13px;color:#64748b}
.o1:hover{border-color:#f97316;box-shadow:inset 0 0 40px rgba(249,115,22,.15)}
.o2:hover{border-color:#06b6d4;box-shadow:inset 0 0 40px rgba(6,182,212,.12)}
.o3:hover{border-color:#f59e0b;box-shadow:inset 0 0 40px rgba(245,158,11,.15)}
</style>
</head>
<body>
<h1>FA<span>I</span>YA Dashboard</h1>
<div class="cards">
  <a class="card o1" href="option1.html">
    <h2>Option 1</h2>
    <p>Faithful — Y chang bản gốc<br>Dark navy · Orange fire · Cyan</p>
  </a>
  <a class="card o2" href="option2.html">
    <h2>Option 2</h2>
    <p>Refined — Tối giản, màu logic<br>Clean dark · DM Sans · Syne</p>
  </a>
  <a class="card o3" href="option3.html">
    <h2>Option 3</h2>
    <p>Neo-Noir — Cyberpunk grid<br>Amber · Teal · IBM Plex Mono</p>
  </a>
</div>
</body>
</html>
